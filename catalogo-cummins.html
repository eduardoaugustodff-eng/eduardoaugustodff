<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO PEÇAS NUNEDIESEL - Catálogo Cummins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a2942 100%);
            color: #e0e7ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #0066ff;
        }

        .header h1 {
            color: #0066ff;
            font-size: 2.5em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1.1em;
            font-weight: 300;
        }

        /* Search Bar */
        .search-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(0, 102, 255, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: #0066ff;
            background: rgba(30, 41, 59, 0.9);
        }

        .search-bar input {
            background: none;
            border: none;
            color: #e0e7ff;
            width: 100%;
            font-size: 1em;
            outline: none;
        }

        .search-bar input::placeholder {
            color: #6b7280;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.6);
            color: #9ca3af;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .view-btn.active {
            background: #0066ff;
            color: white;
        }

        .view-btn:hover {
            background: #0055dd;
            color: white;
        }

        /* Categories */
        .categories-section {
            margin-bottom: 30px;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .category-btn {
            padding: 10px 20px;
            border: 2px solid rgba(0, 102, 255, 0.4);
            background: rgba(30, 41, 59, 0.6);
            color: #9ca3af;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .category-btn:hover {
            border-color: #0066ff;
            color: #0066ff;
        }

        .category-btn.active {
            background: #0066ff;
            border-color: #0066ff;
            color: white;
        }

        /* Results Info */
        .results-info {
            color: #9ca3af;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        /* Cards Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(20, 30, 48, 0.8) 100%);
            border: 2px solid rgba(0, 102, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #0066ff;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(20, 30, 48, 0.95) 100%);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
        }

        .card-code {
            background: #0066ff;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .card-title {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: start;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 102, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6b7280;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .info-value {
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 102, 255, 0.2);
            color: #0066ff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 10px;
            border: 1px solid #0066ff;
        }

        /* Table View */
        .table-view {
            display: none;
            overflow-x: auto;
        }

        .table-view.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(0, 102, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background: linear-gradient(135deg, #0066ff 0%, #0055dd 100%);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            color: white;
            border-bottom: 2px solid rgba(0, 102, 255, 0.5);
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 102, 255, 0.1);
            color: #e0e7ff;
        }

        tr:hover {
            background: rgba(0, 102, 255, 0.1);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state h3 {
            color: #9ca3af;
            margin-bottom: 10px;
        }

        /* Icons (using Unicode) */
        .icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 1.2em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .search-section {
                flex-direction: column;
                gap: 10px;
            }

            .categories {
                gap: 8px;
            }

            .category-btn {
                padding: 8px 14px;
                font-size: 0.8em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><span class="icon">⚙️</span>AUTO PEÇAS NUNEDIESEL</h1>
            <p>Catálogo Interativo - Motor Cummins SÉRIE C 8.3L</p>
        </div>

        <!-- Search and View Toggle -->
        <div class="search-section">
            <div class="search-bar">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Buscar por código, descrição ou número de peça..."
                >
            </div>
            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('cards')">
                    <span class="icon">🎴</span>Cards
                </button>
                <button class="view-btn" onclick="switchView('table')">
                    <span class="icon">📋</span>Tabela
                </button>
            </div>
        </div>

        <!-- Categories -->
        <div class="categories-section">
            <div class="categories">
                <button class="category-btn active" onclick="filterByCategory('all')">
                    <span class="icon">✓</span>Todas as Categorias
                </button>
                <button class="category-btn" onclick="filterByCategory('kits')">
                    <span class="icon">📦</span>KITS MOTOR
                </button>
                <button class="category-btn" onclick="filterByCategory('aneis')">
                    <span class="icon">⭕</span>ANÉIS
                </button>
                <button class="category-btn" onclick="filterByCategory('camisas')">
                    <span class="icon">🔧</span>CAMISAS
                </button>
                <button class="category-btn" onclick="filterByCategory('bronzinas')">
                    <span class="icon">⚡</span>BRONZINAS
                </button>
                <button class="category-btn" onclick="filterByCategory('buchas')">
                    <span class="icon">🔩</span>BUCHAS
                </button>
                <button class="category-btn" onclick="filterByCategory('touchos')">
                    <span class="icon">⚙️</span>TUCHOS
                </button>
                <button class="category-btn" onclick="filterByCategory('valvulas')">
                    <span class="icon">🎯</span>VÁLVULAS
                </button>
                <button class="category-btn" onclick="filterByCategory('guias-sedes')">
                    <span class="icon">📍</span>GUIAS E SEDES
                </button>
                <button class="category-btn" onclick="filterByCategory('juntas')">
                    <span class="icon">🧩</span>JUNTAS
                </button>
                <button class="category-btn" onclick="filterByCategory('selos')">
                    <span class="icon">💧</span>SELOS E RETENTOR
                </button>
                <button class="category-btn" onclick="filterByCategory('bombas')">
                    <span class="icon">💦</span>BOMBAS
                </button>
                <button class="category-btn" onclick="filterByCategory('rolamentos')">
                    <span class="icon">🔴</span>ROLAMENTOS
                </button>
                <button class="category-btn" onclick="filterByCategory('filtros')">
                    <span class="icon">🔲</span>FILTROS
                </button>
            </div>
        </div>

        <!-- Results Info -->
        <div class="results-info">
            <span id="resultCount">Carregando...</span>
        </div>

        <!-- Cards View -->
        <div id="cardsView" class="grid"></div>

        <!-- Table View -->
        <div id="tableView" class="table-view">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Detalhes</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data
        const peças = [
            // Kits Motor
            { codigo: 'P 2002 / K 9068 / K 21660', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 132.95 | 3919564' },
            { codigo: 'P 2002 / K 2002 / K 21630', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3919564, 3919247 | 67mm câmara' },
            { codigo: 'P 2002 / K 9091 / K 21635', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 234.12 / 130.95 | 3919564, 3919247 | 67mm câmara' },
            { codigo: 'P 2003 / K 9048 / K 21500', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 132.95 | 3919564' },
            { codigo: 'P 2003 / K 2003 / K 21510', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3919564 | 64mm câmara' },
            { codigo: 'P 2003 / K 9100 / K 21515', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 234.12 / 130.95 | 3919564' },
            { codigo: 'P 2004 / K 9069 / K 21650', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 132.95 | 3919565' },
            { codigo: 'P 2004 / K 2004 / K 21610', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3919565' },
            { codigo: 'P 2005 / K 2005 / K 21750', descricao: 'KIT MOTOR CPL', categoria: 'kits', detalhes: '3919566' },
            { codigo: 'P 2006 / K 9070 / K 21640', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 132.95 | 3919567' },
            { codigo: 'P 2006 / K 2006 / K 21620', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3919567' },
            { codigo: 'P 2188 / K 2188 / K 21450', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3923163' },
            { codigo: 'P 2189 / K 2189 / K 21460', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3923164' },
            { codigo: 'P 2308 / K 2308 / K 21760', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3929161' },
            { codigo: 'P 9104 / K 9104 / K 21850', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 237.12 / 130.95 | 3917707' },
            { codigo: 'P 9106 / P 9166 / K 9106 / K 9166 / K 21860', descricao: 'KIT MOTOR', categoria: 'kits', detalhes: 'CAMISA 234.12 / 130.95 | 3917707 | 56mm câmara' },

            // Anéis
            { codigo: 'DC 7189 / A21500', descricao: 'ANEL 91 - 1 CIL', categoria: 'aneis', detalhes: 'Anel de compressão' },
            { codigo: 'DC 7192 / A21510', descricao: 'ANEL 91 - 1 CIL', categoria: 'aneis', detalhes: 'Anel de óleo' },
            { codigo: '75064', descricao: 'ANEIS DE CAMISA - JOGO', categoria: 'aneis', detalhes: 'Jogo completo de anéis' },

            // Camisas
            { codigo: 'C 21510', descricao: 'CAMISA MOTOR', categoria: 'camisas', detalhes: '237.12 / 130.95 mm' },
            { codigo: 'C 21900', descricao: 'CAMISA MOTOR', categoria: 'camisas', detalhes: '234.12 / 130.95 mm' },
            { codigo: 'C 21500', descricao: 'CAMISA MOTOR', categoria: 'camisas', detalhes: '237.12 / 132.95 mm' },

            // Bronzinas
            { codigo: 'B 21425', descricao: 'BRONZINA BIELA', categoria: 'bronzinas', detalhes: 'Bronzina de biela' },
            { codigo: 'M 21504', descricao: 'BRONZINA MANCAL', categoria: 'bronzinas', detalhes: 'Bronzina de mancal' },

            // Buchas
            { codigo: 'G 21880', descricao: 'BUCHA BIELA', categoria: 'buchas', detalhes: 'Bucha de biela' },
            { codigo: 'H 21094', descricao: 'BUCHA COMANDO', categoria: 'buchas', detalhes: 'Bucha de comando de válvulas' },

            // Touchos
            { codigo: 'T 21135', descricao: 'TUCHO MOTOR FERRO', categoria: 'touchos', detalhes: 'Tucho de ferro' },
            { codigo: 'T 21216', descricao: 'TUCHO MOTOR AÇO', categoria: 'touchos', detalhes: 'Tucho de aço' },

            // Válvulas
            { codigo: 'VA 0210153', descricao: 'VALVULA ADMISSAO', categoria: 'valvulas', detalhes: 'Válvula de admissão' },
            { codigo: 'VE 0210152', descricao: 'VALVULA ESCAPE', categoria: 'valvulas', detalhes: 'Válvula de escape' },

            // Guias e Sedes
            { codigo: 'GC 0210023', descricao: 'GUIA ADMISSAO E ESCAPE', categoria: 'guias-sedes', detalhes: 'Guia de válvula' },
            { codigo: 'SA 0210071', descricao: 'SEDE ADMISSAO 30°', categoria: 'guias-sedes', detalhes: 'Sede de admissão com 30°' },
            { codigo: 'SE 0210072', descricao: 'SEDE ESCAPE 45°', categoria: 'guias-sedes', detalhes: 'Sede de escape com 45°' },

            // Juntas
            { codigo: '80958', descricao: 'JG. JUNTA COMPL. C/RET. DT / TS', categoria: 'juntas', detalhes: 'Com pista, s/ anéis camisa e haste' },
            { codigo: '80957', descricao: 'JG. JUNTA COMPL. S/RET. E S/ ANEIS', categoria: 'juntas', detalhes: 'Jogo completo sem retentor' },
            { codigo: '79958', descricao: 'JG. JUNTA SUPERIOR C/ RETENTORES', categoria: 'juntas', detalhes: 'Com haste de válvulas' },
            { codigo: '79957', descricao: 'JG. JUNTA SUPERIOR S/ RETENTOR', categoria: 'juntas', detalhes: 'Jogo superior sem retentor' },
            { codigo: '82283', descricao: 'JUNTA CABEÇOTE', categoria: 'juntas', detalhes: 'Junta do cabeçote' },
            { codigo: '75058', descricao: 'JUNTA TAMPA VALVULAS', categoria: 'juntas', detalhes: 'Junta da tampa de válvulas' },
            { codigo: '96029', descricao: 'JUNTA CARTER', categoria: 'juntas', detalhes: 'Junta do cárter' },

            // Selos e Retentor
            { codigo: '05536 GRAGH', descricao: 'RETENTOR POLIA (SEM PISTA)', categoria: 'selos', detalhes: 'Retentor de polia' },
            { codigo: '05287 GRGH', descricao: 'RETENTOR MANCAL TRAZEIRO', categoria: 'selos', detalhes: 'Retentor de mancal traseiro' },
            { codigo: '05604 KIT', descricao: 'KIT RET. POLIA + PISTA + DISPOSITIVO', categoria: 'selos', detalhes: 'Kit completo com dispositivo de montagem' },
            { codigo: '09285 BREF', descricao: 'HASTE VALVULAS C/ CARCAÇA', categoria: 'selos', detalhes: 'Haste de válvulas com carcaça' },

            // Bombas
            { codigo: '10133', descricao: 'BOMBA OLEO', categoria: 'bombas', detalhes: 'Bomba de óleo do motor' },
            { codigo: 'UB 732', descricao: 'BOMBA AGUA', categoria: 'bombas', detalhes: 'Bomba de água do motor' },
            { codigo: 'VT 302.82', descricao: 'VALVULA TERMOSTATICA', categoria: 'bombas', detalhes: 'Válvula termostática' },

            // Comando
            { codigo: 'CO 581', descricao: 'COMANDO DE VALVULAS AÇO', categoria: 'valvulas', detalhes: 'Comando de válvulas de aço' },

            // Virabrequim
            { codigo: 'VB 282', descricao: 'VIRABREQUIM', categoria: 'valvulas', detalhes: 'Eixo virabrequim' },

            // Biela
            { codigo: 'BL 21850', descricao: 'BIELA MOTOR', categoria: 'valvulas', detalhes: 'Biela do motor' },

            // Rolamentos
            { codigo: '6206 2RSR', descricao: 'ROLAMENTO VIRABREQUIM', categoria: 'rolamentos', detalhes: 'Rolamento do virabrequim' },

            // Filtros
            { codigo: '0986B01009', descricao: 'FILTRO LUBRIFICANTE ...92', categoria: 'filtros', detalhes: 'Filtro de óleo' },
            { codigo: '0986B01011', descricao: 'FILTRO LUBRIFICANTE 92...', categoria: 'filtros', detalhes: 'Filtro de óleo alternativo' },
            { codigo: '0986450713', descricao: 'FILTRO COMBUSTÍVEL C/ DRENO', categoria: 'filtros', detalhes: 'Filtro de combustível com dreno' },
            { codigo: '0986450582', descricao: 'FILTRO D\'AGUA', categoria: 'filtros', detalhes: 'Filtro de água' }
        ];

        let currentView = 'cards';
        let currentCategory = 'all';
        let filteredPeças = [...peças];

        // Render
        function renderCards() {
            const container = document.getElementById('cardsView');
            container.innerHTML = '';

            if (filteredPeças.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><h3>Nenhuma peça encontrada</h3><p>Tente ajustar seus filtros ou busca</p></div>';
                return;
            }

            filteredPeças.forEach(peça => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-code">${peça.codigo}</div>
                    <div class="card-title">${peça.descricao}</div>
                    <div class="card-info">
                        <div class="info-row">
                            <span class="info-label">Categoria</span>
                            <span class="info-value">${peça.categoria.toUpperCase()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Detalhes</span>
                            <span class="info-value">${peça.detalhes}</span>
                        </div>
                    </div>
                    <span class="badge">Cummins SÉRIE C</span>
                `;
                container.appendChild(card);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (filteredPeças.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">Nenhuma peça encontrada</td></tr>';
                return;
            }

            filteredPeças.forEach(peça => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${peça.codigo}</strong></td>
                    <td>${peça.descricao}</td>
                    <td><span class="badge">${peça.categoria.toUpperCase()}</span></td>
                    <td>${peça.detalhes}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filter
        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'all') {
                filteredPeças = [...peças];
            } else {
                filteredPeças = peças.filter(p => p.categoria === category);
            }

            updateResults();
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            filteredPeças = peças.filter(p => {
                const matchesSearch = p.codigo.toLowerCase().includes(query) ||
                                     p.descricao.toLowerCase().includes(query) ||
                                     p.detalhes.toLowerCase().includes(query);

                const matchesCategory = currentCategory === 'all' || p.categoria === currentCategory;
                return matchesSearch && matchesCategory;
            });
            updateResults();
        });

        // View Switch
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.view-btn').classList.add('active');

            document.getElementById('cardsView').classList.remove('active');
            document.getElementById('tableView').classList.remove('active');

            if (view === 'cards') {
                document.getElementById('cardsView').classList.add('active');
                renderCards();
            } else {
                document.getElementById('tableView').classList.add('active');
                renderTable();
            }
        }

        // Update Results
        function updateResults() {
            document.getElementById('resultCount').textContent = `${filteredPeças.length} peça(s) encontrada(s)`;
            if (currentView === 'cards') {
                renderCards();
            } else {
                renderTable();
            }
        }

        // Initial Render
        renderCards();
        updateResults();
    </script>
</body>
</html>
